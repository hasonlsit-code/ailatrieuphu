<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ai Là Triệu Phú - Triết học Mác-Lênin</title>
<meta name="description" content="Trò chơi Ai Là Triệu Phú chủ đề Triết học Mác-Lênin (MLN121). Kiểm tra kiến thức triết học của bạn qua 15 câu hỏi!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
<style>
  :root {
    --navy-1: #010b2e;
    --navy-2: #062372;
    --navy-3: #0a3aa8;
    --gold: #f5c542;
    --gold-dark: #b8860b;
    --white: #f4f7ff;
    --orange: #ff9800;
    --green: #2ecc71;
    --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--white);
    background: radial-gradient(ellipse at 50% 30%, var(--navy-3) 0%, var(--navy-2) 40%, var(--navy-1) 100%) fixed;
    overflow-x: hidden;
  }
  /* ===== Spotlight animation backdrop ===== */
  .spotlights {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .35;
  }
  .spotlights::before, .spotlights::after {
    content: ""; position: absolute; top: -30%; width: 55vw; height: 160%;
    background: linear-gradient(180deg, rgba(120,170,255,.28), transparent 70%);
    transform-origin: top center;
    animation: sweep 9s ease-in-out infinite alternate;
  }
  .spotlights::before { left: 8%; transform: rotate(18deg); }
  .spotlights::after  { right: 8%; transform: rotate(-18deg); animation-delay: -4.5s; }
  @keyframes sweep {
    from { transform: rotate(14deg); }
    to   { transform: rotate(-14deg); }
  }
  .screen { position: relative; z-index: 1; min-height: 100vh; display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ================= START / INTRO ================= */
  #screen-start { justify-content: center; text-align: center; padding: 24px; }
  .logo-ring {
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #14337c, #04102e 75%);
    border: 6px solid var(--gold);
    box-shadow: 0 0 45px rgba(245,197,66,.55), inset 0 0 35px rgba(245,197,66,.25);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: pulse 2.6s ease-in-out infinite;
    margin-bottom: 28px;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(245,197,66,.4), inset 0 0 30px rgba(245,197,66,.2); }
    50%     { box-shadow: 0 0 65px rgba(245,197,66,.75), inset 0 0 45px rgba(245,197,66,.35); }
  }
  .logo-ring .money { font-size: 52px; }
  .logo-ring .brand { font-size: 15px; font-weight: 800; letter-spacing: 2px; color: var(--gold); margin-top: 6px; text-transform: uppercase; }
  h1.title {
    font-size: clamp(30px, 6vw, 56px); font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(180deg, #fff2c4, var(--gold) 55%, var(--gold-dark));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 4px 24px rgba(245,197,66,.25);
  }
  .subtitle { font-size: clamp(16px, 2.6vw, 22px); margin-top: 10px; color: #cfe0ff; font-weight: 600; }
  .subtitle b { color: var(--gold); }
  .course-tag {
    display: inline-block; margin-top: 14px; padding: 6px 18px; border-radius: 999px;
    border: 1px solid rgba(245,197,66,.6); color: var(--gold); font-weight: 700; font-size: 14px;
    background: rgba(245,197,66,.08); letter-spacing: 1.5px;
  }
  .btn {
    cursor: pointer; border: 2px solid var(--gold); border-radius: 999px;
    background: linear-gradient(180deg, #123a8f, #071c52);
    color: var(--white); font-size: 18px; font-weight: 700; padding: 14px 44px;
    transition: transform .15s, box-shadow .15s, background .2s;
    box-shadow: 0 4px 18px rgba(0,0,0,.45);
  }
  .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 0 26px rgba(245,197,66,.55); background: linear-gradient(180deg, #1a4cb5, #0a2668); }
  .btn:active { transform: scale(.97); }
  .btn.gold { background: linear-gradient(180deg, #ffdf80, var(--gold) 45%, #c8951a); color: #2a1c00; border-color: #fff0c0; }
  .btn.gold:hover { background: linear-gradient(180deg, #ffe9a3, #ffce4f 45%, #d8a52a); }
  .btn.ghost { background: transparent; border-color: rgba(255,255,255,.35); font-size: 15px; padding: 10px 26px; }
  .btn.ghost:hover { box-shadow: none; border-color: var(--gold); }
  .start-actions { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

  /* ---- Intro slides ---- */
  #screen-intro { justify-content: center; padding: 30px 18px; }
  .intro-card {
    width: min(860px, 96vw);
    background: linear-gradient(180deg, rgba(10,35,105,.92), rgba(3,12,45,.95));
    border: 2px solid rgba(245,197,66,.65); border-radius: 22px;
    box-shadow: 0 10px 60px rgba(0,0,0,.6), 0 0 40px rgba(245,197,66,.12);
    padding: clamp(24px, 4vw, 48px);
    animation: cardIn .5s ease both;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(26px) scale(.97); } to { opacity: 1; transform: none; } }
  .intro-step { font-size: 13px; letter-spacing: 3px; color: var(--gold); font-weight: 800; text-transform: uppercase; }
  .intro-card h2 { font-size: clamp(24px, 4vw, 34px); margin: 10px 0 18px; color: #ffe9a3; }
  .intro-card p { font-size: clamp(15px, 2.2vw, 17.5px); line-height: 1.75; color: #dbe6ff; margin-bottom: 14px; text-align: justify; }
  .intro-card p b { color: var(--gold); }
  .intro-quote {
    margin: 18px 0; padding: 16px 22px; border-left: 4px solid var(--gold);
    background: rgba(245,197,66,.07); border-radius: 0 12px 12px 0;
    font-style: italic; color: #ffedb8; font-size: clamp(15px, 2.2vw, 17px); line-height: 1.7;
  }
  .intro-quote span { display: block; margin-top: 8px; font-style: normal; font-size: 14px; color: #9fb4e8; }
  .rule-list { list-style: none; margin: 6px 0 14px; }
  .rule-list li {
    display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px;
    font-size: clamp(15px, 2.2vw, 17px); line-height: 1.6; color: #dbe6ff;
  }
  .rule-list .ic { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%; background: rgba(245,197,66,.15); border: 1px solid rgba(245,197,66,.5); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .intro-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; gap: 12px; flex-wrap: wrap; }
  .dots { display: flex; gap: 10px; }
  .dots i { width: 11px; height: 11px; border-radius: 50%; background: rgba(255,255,255,.25); transition: .25s; }
  .dots i.on { background: var(--gold); box-shadow: 0 0 10px rgba(245,197,66,.8); transform: scale(1.2); }

  /* ================= GAME ================= */
  #screen-game { padding: 14px; }
  .game-wrap { width: min(1180px, 100%); display: grid; grid-template-columns: 1fr 250px; gap: 18px; flex: 1; }
  .stage { display: flex; flex-direction: column; }
  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .q-counter { font-weight: 800; color: var(--gold); font-size: 17px; letter-spacing: .5px; }
  .lifelines { display: flex; gap: 10px; }
  .lifeline {
    width: 62px; height: 44px; border-radius: 999px; cursor: pointer;
    border: 2px solid var(--gold); background: radial-gradient(circle at 50% 35%, #1a4cb5, #071c52);
    color: var(--white); font-weight: 800; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: .2s; position: relative;
  }
  .lifeline:hover:not(.used) { box-shadow: 0 0 18px rgba(245,197,66,.6); transform: translateY(-2px); }
  .lifeline.used { opacity: .35; cursor: not-allowed; }
  .lifeline.used::after {
    content: ""; position: absolute; inset: 4px; border-radius: 999px;
    background: linear-gradient(45deg, transparent 46%, var(--red) 46%, var(--red) 54%, transparent 54%),
                linear-gradient(-45deg, transparent 46%, var(--red) 46%, var(--red) 54%, transparent 54%);
  }
  .host {
    flex: 1; min-height: 130px; display: flex; align-items: center; justify-content: center;
    padding: 10px 0;
  }
  .host-msg { max-width: 700px; text-align: center; color: #bcd0ff; font-size: 16px; line-height: 1.6; }
  .timer {
    width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 12px;
    border: 4px solid var(--gold); display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 900; color: var(--white);
    background: radial-gradient(circle, #0a2f86, #030d30);
    box-shadow: 0 0 22px rgba(245,197,66,.35);
  }
  .timer.warn { color: var(--red); border-color: var(--red); animation: blink .5s steps(2) infinite; }
  @keyframes blink { 50% { box-shadow: 0 0 30px rgba(231,76,60,.8); } }

  .question-box {
    position: relative; background: linear-gradient(180deg, #0d2f7e, #041236);
    border: 2px solid var(--gold); border-radius: 16px;
    padding: 22px 28px; text-align: center;
    font-size: clamp(17px, 2.6vw, 22px); font-weight: 700; line-height: 1.55;
    box-shadow: 0 6px 30px rgba(0,0,0,.5);
    min-height: 92px; display: flex; align-items: center; justify-content: center;
  }
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-top: 16px; }
  .answer {
    position: relative; cursor: pointer; border: 2px solid #3c6ad4; border-radius: 999px;
    background: linear-gradient(180deg, #0d2f7e, #041236);
    padding: 14px 20px 14px 52px; font-size: clamp(15px, 2.2vw, 17.5px); font-weight: 600;
    color: var(--white); text-align: left; transition: .18s; line-height: 1.4;
    display: flex; align-items: center; min-height: 56px;
  }
  .answer .key { position: absolute; left: 20px; color: var(--gold); font-weight: 900; }
  .answer:hover:not(.disabled):not(.hidden-a) { border-color: var(--gold); background: linear-gradient(180deg, #14459f, #072055); box-shadow: 0 0 16px rgba(245,197,66,.4); }
  .answer.selected { background: linear-gradient(180deg, #ffb300, #e07800); border-color: #ffe9a3; color: #241300; animation: blinkSel .45s steps(2) infinite; }
  .answer.selected .key { color: #241300; }
  @keyframes blinkSel { 50% { filter: brightness(1.25); } }
  .answer.correct { background: linear-gradient(180deg, #35d97b, #128a43) !important; border-color: #baffd8; color: #04240f; animation: none; }
  .answer.correct .key { color: #04240f; }
  .answer.wrong { background: linear-gradient(180deg, #ff6d5a, #b32215) !important; border-color: #ffc9c0; color: #2c0500; animation: none; }
  .answer.wrong .key { color: #2c0500; }
  .answer.disabled { cursor: default; }
  .answer.hidden-a { opacity: 0; pointer-events: none; }

  .game-actions { display: flex; justify-content: center; gap: 12px; margin-top: 18px; flex-wrap: wrap; }

  /* ---- money ladder ---- */
  .ladder {
    background: linear-gradient(180deg, rgba(6,20,60,.9), rgba(2,8,28,.95));
    border: 2px solid rgba(245,197,66,.5); border-radius: 16px; padding: 14px 10px;
    display: flex; flex-direction: column-reverse; justify-content: center; gap: 2px;
    box-shadow: 0 6px 30px rgba(0,0,0,.5);
  }
  .rung {
    display: flex; align-items: center; gap: 8px; padding: 5px 12px; border-radius: 999px;
    font-size: 14.5px; font-weight: 700; color: #9db4ea; transition: .2s;
  }
  .rung .n { width: 22px; text-align: right; color: #6f87c4; font-size: 12.5px; }
  .rung.milestone { color: var(--white); }
  .rung.milestone .n { color: #cfe0ff; }
  .rung.current { background: linear-gradient(90deg, var(--orange), #ffb300); color: #241300; box-shadow: 0 0 16px rgba(255,152,0,.7); }
  .rung.current .n { color: #241300; }
  .rung.passed { color: var(--gold); }
  .rung.passed .n { color: var(--gold-dark); }

  /* ---- modal ---- */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 50; background: rgba(1,5,20,.78);
    display: none; align-items: center; justify-content: center; padding: 18px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    width: min(560px, 96vw); background: linear-gradient(180deg, #0c2b74, #041033);
    border: 2px solid var(--gold); border-radius: 20px; padding: 28px;
    text-align: center; box-shadow: 0 0 60px rgba(0,0,0,.7); animation: cardIn .35s ease both;
  }
  .modal h3 { color: var(--gold); font-size: 22px; margin-bottom: 14px; }
  .modal p { color: #dbe6ff; line-height: 1.65; font-size: 16px; margin-bottom: 10px; }
  .modal .btn { margin-top: 14px; }
  .audience-bars { display: flex; justify-content: center; align-items: flex-end; gap: 26px; height: 170px; margin: 18px 0 6px; }
  .abar { width: 46px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .abar .bar { width: 100%; border-radius: 6px 6px 0 0; background: linear-gradient(180deg, #ffd257, var(--orange)); box-shadow: 0 0 12px rgba(255,152,0,.5); transition: height 1s ease; height: 0; }
  .abar .pct { font-weight: 800; color: var(--gold); font-size: 14px; }
  .abar .lbl { font-weight: 900; color: var(--white); }
  .phone-quote { font-style: italic; color: #ffedb8; background: rgba(245,197,66,.08); border-radius: 12px; padding: 16px; margin-top: 10px; line-height: 1.6; }

  /* ================= END SCREENS ================= */
  #screen-end { justify-content: center; text-align: center; padding: 24px; }
  .end-emoji { font-size: 74px; margin-bottom: 12px; }
  .end-title { font-size: clamp(28px, 5vw, 44px); font-weight: 900; color: var(--gold); margin-bottom: 12px; }
  .end-prize { font-size: clamp(22px, 4vw, 34px); font-weight: 900; color: var(--white); margin: 6px 0 4px; }
  .end-msg { max-width: 640px; color: #cfe0ff; line-height: 1.7; font-size: 17px; margin: 10px auto 0; }
  .end-fact { max-width: 640px; margin: 22px auto 0; padding: 16px 22px; border: 1px dashed rgba(245,197,66,.6); border-radius: 14px; color: #ffedb8; font-size: 15px; line-height: 1.65; background: rgba(245,197,66,.06); }
  .confetti { position: fixed; top: -12px; z-index: 5; font-size: 22px; animation: fall linear forwards; pointer-events: none; }
  @keyframes fall { to { transform: translateY(105vh) rotate(720deg); opacity: .6; } }

  footer { position: relative; z-index: 1; text-align: center; color: #6f87c4; font-size: 12.5px; padding: 14px; }

  @media (max-width: 860px) {
    .game-wrap { grid-template-columns: 1fr; }
    .ladder { flex-direction: row-reverse; flex-wrap: wrap-reverse; gap: 4px; justify-content: center; }
    .rung { font-size: 11.5px; padding: 4px 8px; }
    .rung .n { width: auto; }
    .rung:not(.current):not(.milestone):not(.passed) { display: none; }
    .answers { grid-template-columns: 1fr; }
    .host { min-height: 60px; }
  }
</style>
</head>
<body>
<div class="spotlights"></div>

<!-- ============ START ============ -->
<section id="screen-start" class="screen active">
  <div class="logo-ring">
    <div class="money">💎</div>
    <div class="brand">Triệu phú<br>Tri thức</div>
  </div>
  <h1 class="title">AI LÀ TRIỆU PHÚ</h1>
  <div class="subtitle">Phiên bản đặc biệt: <b>Triết học Mác - Lênin</b></div>
  <div class="course-tag">MLN121 · PHILOSOPHY EDITION</div>
  <div class="start-actions">
    <button class="btn gold" onclick="showIntro(0)">🎬 Bắt đầu hành trình</button>
    <button class="btn" onclick="startGame()">⚡ Vào game ngay</button>
  </div>
  <footer>Sản phẩm học tập môn Triết học Mác - Lênin · Lấy cảm hứng từ chương trình "Ai Là Triệu Phú"</footer>
</section>

<!-- ============ INTRO ============ -->
<section id="screen-intro" class="screen">
  <div class="intro-card" id="intro-card"></div>
</section>

<!-- ============ GAME ============ -->
<section id="screen-game" class="screen">
  <div class="game-wrap">
    <div class="stage">
      <div class="topbar">
        <div class="q-counter" id="q-counter">Câu 1</div>
        <div class="lifelines">
          <button class="lifeline" id="ll-5050" title="50:50 - Loại bỏ 2 phương án sai" onclick="use5050()">50:50</button>
          <button class="lifeline" id="ll-phone" title="Gọi điện thoại cho người thân" onclick="usePhone()">📞</button>
          <button class="lifeline" id="ll-audience" title="Hỏi ý kiến khán giả" onclick="useAudience()">👥</button>
        </div>
      </div>
      <div class="host"><div class="host-msg" id="host-msg"></div></div>
      <div class="timer" id="timer">30</div>
      <div class="question-box" id="question-text"></div>
      <div class="answers" id="answers"></div>
      <div class="game-actions">
        <button class="btn ghost" id="btn-walk" onclick="walkAway()">🏳️ Dừng cuộc chơi</button>
      </div>
    </div>
    <aside class="ladder" id="ladder"></aside>
  </div>
</section>

<!-- ============ END ============ -->
<section id="screen-end" class="screen">
  <div class="end-emoji" id="end-emoji">🎉</div>
  <div class="end-title" id="end-title"></div>
  <div class="end-prize" id="end-prize"></div>
  <div class="end-msg" id="end-msg"></div>
  <div class="end-fact" id="end-fact"></div>
  <div class="start-actions">
    <button class="btn gold" onclick="startGame()">🔄 Chơi lại</button>
    <button class="btn" onclick="goHome()">🏠 Về trang chủ</button>
  </div>
</section>

<!-- ============ MODAL ============ -->
<div class="modal-backdrop" id="modal">
  <div class="modal" id="modal-content"></div>
</div>

<script>
"use strict";
/* =====================================================
   AI LÀ TRIỆU PHÚ - TRIẾT HỌC MÁC-LÊNIN (MLN121)
   Ngân hàng 60 câu hỏi chia 3 mức độ, mỗi ván lấy ngẫu nhiên
   ===================================================== */

const PRIZES = [
  "200.000", "400.000", "600.000", "1.000.000", "2.000.000",
  "3.000.000", "6.000.000", "10.000.000", "14.000.000", "22.000.000",
  "30.000.000", "40.000.000", "60.000.000", "85.000.000", "150.000.000"
];
const MILESTONES = [4, 9]; // index câu 5 và câu 10 (mốc an toàn)
const TIME_PER_QUESTION = 30;

/* q: câu hỏi, a: 4 đáp án, c: index đáp án đúng, e: giải thích ngắn */
const EASY = [
  { q: "Triết học Mác được sáng lập bởi ai?", a: ["C.Mác và V.I.Lênin", "C.Mác và Ph.Ăngghen", "Ph.Ăngghen và Hêghen", "V.I.Lênin và Xtalin"], c: 1, e: "C.Mác và Ph.Ăngghen sáng lập vào những năm 40 của thế kỷ XIX, sau đó V.I.Lênin bảo vệ và phát triển." },
  { q: "Triết học ra đời vào khoảng thời gian nào?", a: ["Thế kỷ VIII - VI trước Công nguyên", "Thế kỷ I sau Công nguyên", "Thế kỷ XV - XVI", "Thế kỷ XIX"], c: 0, e: "Triết học ra đời gần như đồng thời ở phương Đông và phương Tây vào khoảng thế kỷ VIII - VI TCN." },
  { q: "Vấn đề cơ bản của triết học là gì?", a: ["Mối quan hệ giữa con người và tự nhiên", "Mối quan hệ giữa tư duy và tồn tại", "Mối quan hệ giữa cá nhân và xã hội", "Mối quan hệ giữa lý luận và thực tiễn"], c: 1, e: "Theo Ph.Ăngghen, vấn đề cơ bản lớn của mọi triết học là mối quan hệ giữa tư duy và tồn tại (ý thức và vật chất)." },
  { q: "Chủ nghĩa duy vật khẳng định điều gì?", a: ["Ý thức có trước, vật chất có sau", "Vật chất có trước, ý thức có sau", "Vật chất và ý thức cùng tồn tại độc lập", "Không thể biết cái nào có trước"], c: 1, e: "Chủ nghĩa duy vật khẳng định vật chất có trước, quyết định ý thức." },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Trộn cả thứ tự đáp án trong từng câu */
function prepQuestion(raw) {
  const order = shuffle([0, 1, 2, 3]);
  return {
    q: raw.q,
    a: order.map(i => raw.a[i]),
    c: order.indexOf(raw.c),
    e: raw.e
  };
}

function buildQuestionSet() {
  return [
    ...shuffle(EASY).slice(0, 5),
    ...shuffle(MEDIUM).slice(0, 5),
    ...shuffle(HARD).slice(0, 5)
  ].map(prepQuestion);
}

/* ===================== SOUND (WebAudio, không cần file) ===================== */
let audioCtx = null;
function playTone(freq, dur, type = "sine", vol = 0.12) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* âm thanh không khả dụng */ }
}

    </div>`).join("");
}

function updateLadder() {
  PRIZES.forEach((_, i) => {
    const r = $("rung-" + i);
    r.classList.toggle("current", i === currentIndex);
    r.classList.toggle("passed", i < currentIndex);
  });
}

function renderQuestion() {
  const item = gameQuestions[currentIndex];
  selectedAnswer = -1; locked = false; hiddenAnswers = [];
  $("q-counter").textContent = `Câu ${currentIndex + 1} · ${PRIZES[currentIndex]} đ`;
  $("host-msg").textContent = HOST_LINES[Math.floor(Math.random() * HOST_LINES.length)];
  $("question-text").textContent = item.q;
  $("answers").innerHTML = item.a.map((t, i) => `
    <button class="answer" id="ans-${i}" onclick="pickAnswer(${i})">
      <span class="key">${"ABCD"[i]}:</span>${t}
    </button>`).join("");
  updateLadder();
  startTimer();
}

function startTimer() {
  clearInterval(timerId);
  timeLeft = TIME_PER_QUESTION;
  const t = $("timer");
  t.textContent = timeLeft; t.classList.remove("warn");
  timerId = setInterval(() => {
    timeLeft--;
    t.textContent = timeLeft;
    if (timeLeft <= 10) { t.classList.add("warn"); if (timeLeft > 0) playTone(700, .06, "square", .05); }
    if (timeLeft <= 0) { clearInterval(timerId); timeUp(); }
  }, 1000);
}

function pickAnswer(i) {
  if (locked || hiddenAnswers.includes(i)) return;
  selectedAnswer = i;
  document.querySelectorAll(".answer").forEach(a => a.classList.remove("selected"));
  $("ans-" + i).classList.add("selected");
  playTone(600, .1, "square", .08);
  openModal(`
    <h3>Chốt đáp án?</h3>
    <p>Bạn chọn phương án <b style="color:var(--gold)">${"ABCD"[i]}</b>:<br>"${gameQuestions[currentIndex].a[i]}"</p>
    <p style="color:#9fb4e8">Đây có phải là câu trả lời cuối cùng của bạn?</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn gold" onclick="closeModal();lockAnswer()">✔️ Chốt!</button>
      <button class="btn ghost" onclick="closeModal();unselect()">Suy nghĩ thêm</button>
    </div>`);
}

function unselect() {
  selectedAnswer = -1;
  document.querySelectorAll(".answer").forEach(a => a.classList.remove("selected"));
}

function lockAnswer() {
  if (selectedAnswer < 0 || locked) return;
  locked = true;
  clearInterval(timerId);
  document.querySelectorAll(".answer").forEach(a => a.classList.add("disabled"));
  const item = gameQuestions[currentIndex];
  /* hiệu ứng hồi hộp */
  $("host-msg").textContent = "Và câu trả lời chính xác là... 🥁";
  playTone(200, 1.4, "sine", .07);
  setTimeout(() => {
    const correct = selectedAnswer === item.c;
    $("ans-" + item.c).classList.add("correct");
    if (!correct) $("ans-" + selectedAnswer).classList.add("wrong");
    if (correct) { soundCorrect(); } else { soundWrong(); }
    setTimeout(() => (correct ? onCorrect(item) : onWrong(item)), 1200);
  }, 1600);
}

function onCorrect(item) {
  const wonAll = currentIndex === PRIZES.length - 1;
  openModal(`
    <h3>🎉 Chính xác!</h3>
    <p>Bạn đã vượt qua <b>câu ${currentIndex + 1}</b> và đang có <b style="color:var(--gold)">${PRIZES[currentIndex]} đ</b>!</p>
    <p style="font-size:14.5px;color:#9fb4e8;text-align:left"><b style="color:var(--gold)">💡 Giải thích:</b> ${item.e}</p>
    <button class="btn gold" onclick="closeModal();${wonAll ? "endGame('win')" : "nextQuestion()"}">${wonAll ? "🏆 Nhận giải thưởng!" : "Câu tiếp theo →"}</button>`);
}

function onWrong(item) {
  openModal(`
    <h3>😢 Rất tiếc!</h3>
    <p>Đáp án đúng là <b style="color:var(--green)">${"ABCD"[item.c]}: ${item.a[item.c]}</b></p>
    <p style="font-size:14.5px;color:#9fb4e8;text-align:left"><b style="color:var(--gold)">💡 Giải thích:</b> ${item.e}</p>
    <button class="btn" onclick="closeModal();endGame('lose')">Xem kết quả</button>`);
}

function timeUp() {
  locked = true;
  document.querySelectorAll(".answer").forEach(a => a.classList.add("disabled"));
  const item = gameQuestions[currentIndex];
  $("ans-" + item.c).classList.add("correct");
  soundWrong();
  openModal(`
    <h3>⏰ Hết giờ!</h3>
    <p>Thời gian đã hết. Đáp án đúng là <b style="color:var(--green)">${"ABCD"[item.c]}: ${item.a[item.c]}</b></p>
    <p style="font-size:14.5px;color:#9fb4e8;text-align:left"><b style="color:var(--gold)">💡 Giải thích:</b> ${item.e}</p>
    <button class="btn" onclick="closeModal();endGame('lose')">Xem kết quả</button>`);
}

function nextQuestion() {
  currentIndex++;
  renderQuestion();
}

function walkAway() {
  if (locked) return;
  clearInterval(timerId);
  const current = currentIndex === 0 ? "0" : PRIZES[currentIndex - 1];
  openModal(`
    <h3>🏳️ Dừng cuộc chơi?</h3>
    <p>Nếu dừng ngay bây giờ, bạn sẽ ra về với <b style="color:var(--gold)">${current} đ</b>.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn gold" onclick="closeModal();endGame('walk')">Dừng lại</button>
      <button class="btn ghost" onclick="closeModal();startTimer()">Chơi tiếp!</button>
    </div>`);
}

/* ===================== LIFELINES ===================== */
function use5050() {
  if (!lifelines.fifty || locked) return;
  lifelines.fifty = false;
  $("ll-5050").classList.add("used");
  const item = gameQuestions[currentIndex];
  const wrongs = shuffle([0, 1, 2, 3].filter(i => i !== item.c)).slice(0, 2);
  hiddenAnswers = wrongs;
  wrongs.forEach(i => $("ans-" + i).classList.add("hidden-a"));
  if (wrongs.includes(selectedAnswer)) unselect();
  playTone(880, .18, "triangle");
  $("host-msg").textContent = "Máy tính đã loại bỏ 2 phương án sai. Còn lại 2 lựa chọn thôi!";
}

const FRIENDS = [
  { name: "bạn cùng lớp học giỏi nhất", conf: ["Tớ chắc chắn 100% luôn", "Cái này thầy vừa ôn tuần trước mà", "Tin tớ đi"] },
  { name: "anh sinh viên năm cuối từng được A+ môn Triết", conf: ["Anh nhớ rõ trong giáo trình", "Câu này kinh điển lắm", "Anh từng thi đúng câu này"] },
  { name: "cô giáo dạy Triết hồi cấp ba", conf: ["Cô nghĩ chắc chắn là", "Trong sách giáo khoa có ghi", "Cô tin là"] },
];

function usePhone() {
  if (!lifelines.phone || locked) return;
  lifelines.phone = false;
  $("ll-phone").classList.add("used");
  clearInterval(timerId);
  const item = gameQuestions[currentIndex];
  const friend = FRIENDS[Math.floor(Math.random() * FRIENDS.length)];
  /* người thân đúng ~80%, câu khó thì kém chắc chắn hơn */
  const reliability = currentIndex < 5 ? 0.92 : currentIndex < 10 ? 0.8 : 0.68;
  const options = [0, 1, 2, 3].filter(i => !hiddenAnswers.includes(i));
  const guess = Math.random() < reliability ? item.c : shuffle(options.filter(i => i !== item.c))[0] ?? item.c;
  const phrase = friend.conf[Math.floor(Math.random() * friend.conf.length)];
  playTone(440, .15); setTimeout(() => playTone(440, .15), 350);
  openModal(`
    <h3>📞 Gọi điện cho người thân</h3>
    <p>Bạn gọi cho <b>${friend.name}</b>...</p>
    <div class="phone-quote">"Alo! Ừ ừ, để nghe câu hỏi nào... ${phrase}, đáp án là <b style="color:var(--gold);font-size:20px">${"ABCD"[guess]}</b> đó!"</div>
    <p style="font-size:13px;color:#9fb4e8;margin-top:10px">(Người thân cũng có thể nhầm đấy nhé 😅)</p>
    <button class="btn gold" onclick="closeModal();startTimer()">Cảm ơn, tiếp tục!</button>`);
}

function useAudience() {
  if (!lifelines.audience || locked) return;
  lifelines.audience = false;
  $("ll-audience").classList.add("used");
  clearInterval(timerId);
  const item = gameQuestions[currentIndex];
  const options = [0, 1, 2, 3];
  /* Khán giả nghiêng về đáp án đúng, câu khó thì phân tán hơn */
  const base = currentIndex < 5 ? 62 : currentIndex < 10 ? 48 : 38;
  const pct = [0, 0, 0, 0];
  pct[item.c] = base + Math.floor(Math.random() * 15);
  let remain = 100 - pct[item.c];
  const others = options.filter(i => i !== item.c);
  others.forEach((i, k) => {
    if (hiddenAnswers.includes(i)) { pct[i] = 0; return; }
    if (k === others.length - 1) { pct[i] = remain; }
    else { const v = Math.floor(Math.random() * remain * 0.7); pct[i] = v; remain -= v; }
  });
  /* nếu 50:50 đã dùng, dồn hết phần các ô ẩn về các ô còn lại */
  const hiddenSum = others.filter(i => hiddenAnswers.includes(i)).length > 0
    ? 100 - pct.reduce((s, v) => s + v, 0) : 0;
  pct[item.c] += hiddenSum;
  playTone(520, .12); setTimeout(() => playTone(660, .12), 200);
  openModal(`
    <h3>👥 Ý kiến khán giả trường quay</h3>
    <div class="audience-bars">
      ${options.map(i => `
        <div class="abar">
          <div class="pct" id="pct-${i}">0%</div>
          <div class="bar" id="bar-${i}"></div>
          <div class="lbl">${"ABCD"[i]}</div>
        </div>`).join("")}
    </div>
    <p style="font-size:13px;color:#9fb4e8">(Khán giả đông nhưng... cũng chưa ai qua môn cả 😅)</p>
    <button class="btn gold" onclick="closeModal();startTimer()">Cảm ơn khán giả!</button>`);
  setTimeout(() => options.forEach(i => {
    const bar = $("bar-" + i), lbl = $("pct-" + i);
    if (bar) { bar.style.height = Math.max(4, pct[i] * 1.4) + "px"; lbl.textContent = pct[i] + "%"; }
  }), 80);
}

/* ===================== END ===================== */
const PHILO_FACTS = [
  "💡 Bạn có biết: C.Mác viết luận án tiến sĩ về triết học Êpiquya khi mới 23 tuổi.",
  "💡 Bạn có biết: Bộ 'Tư bản' tập 2 và 3 do Ph.Ăngghen biên tập và xuất bản sau khi C.Mác qua đời.",
  "💡 Bạn có biết: Câu 'Vô sản toàn thế giới, đoàn kết lại!' là khẩu hiệu kết thúc Tuyên ngôn của Đảng Cộng sản.",
  "💡 Bạn có biết: V.I.Lênin thông thạo nhiều ngoại ngữ và đọc Hêghen bằng nguyên bản tiếng Đức.",
  "💡 Bạn có biết: 'Biện chứng' (dialektike) trong tiếng Hy Lạp cổ nghĩa là nghệ thuật đối thoại, tranh luận.",
  "💡 Bạn có biết: C.Mác và Ph.Ăngghen là đôi bạn thân và cộng sự trong suốt 40 năm.",
];

function endGame(result) {
  clearInterval(timerId);
  let prize, title, emoji, msg;
  if (result === "win") {
    prize = PRIZES[14];
    emoji = "👑"; title = "TRIỆU PHÚ TRI THỨC!";
    msg = "Không thể tin được! Bạn đã chinh phục cả 15 câu hỏi triết học Mác - Lênin. Một thế giới quan khoa học vững vàng, một phương pháp luận biện chứng sắc bén. Xin chúc mừng nhà TRIỆU PHÚ TRI THỨC!";
    soundWin(); confetti();
  } else if (result === "walk") {
    prize = currentIndex === 0 ? "0" : PRIZES[currentIndex - 1];
    emoji = "🤝"; title = "Dừng cuộc chơi đúng lúc!";
    msg = `Biết mình biết ta - một quyết định rất "biện chứng"! Bạn ra về an toàn ở câu số ${currentIndex + 1}. Hẹn gặp lại ở lần chinh phục tiếp theo!`;
    if (currentIndex > 4) confetti();
  } else {
    /* rơi về mốc an toàn */
    let safe = "0";
    for (const m of MILESTONES) if (currentIndex > m) safe = PRIZES[m];
    prize = safe;
    emoji = currentIndex > 4 ? "💪" : "🌱";
    title = "Cuộc chơi kết thúc!";
    msg = currentIndex > 9
      ? `Tiếc quá, bạn dừng bước ở câu ${currentIndex + 1} - đã rất gần đỉnh vinh quang! Về ôn thêm chút nữa là vô địch.`
      : currentIndex > 4
        ? `Bạn dừng bước ở câu ${currentIndex + 1} và rơi về mốc an toàn. Kết quả rất khá rồi, cày thêm giáo trình chút nữa nhé!`
        : `Bạn dừng bước ở câu ${currentIndex + 1}. Đừng buồn - "thực tiễn là tiêu chuẩn của chân lý", chơi lại vài lần là kiến thức sẽ vững ngay!`;
  }
  $("end-emoji").textContent = emoji;
  $("end-title").textContent = title;
  $("end-prize").innerHTML = `💰 ${prize} đ`;
  $("end-msg").textContent = msg;
  $("end-fact").textContent = PHILO_FACTS[Math.floor(Math.random() * PHILO_FACTS.length)];
  showScreen("screen-end");
}

function confetti() {
  const icons = ["🎉", "✨", "💎", "🏆", "⭐", "🎊"];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = 2.5 + Math.random() * 3 + "s";
    el.style.animationDelay = Math.random() * 1.5 + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 7000);
  }
}

/* ===================== MODAL ===================== */
function openModal(html) {
  $("modal-content").innerHTML = html;
  $("modal").classList.add("show");
}
function closeModal() { $("modal").classList.remove("show"); }
</script>
